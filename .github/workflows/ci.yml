name: CBT Sekolah CI/CD

on:
  push:
    branches: [ main, develop, feature/*, hotfix/* ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published, created, edited, deleted ]

env:
  PHP_VERSION: '8.1'
  NODE_VERSION: '18'
  MYSQL_VERSION: '8.0'
  REDIS_VERSION: '7.0'

jobs:
  # Code Quality Checks
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, redis, gd, zip, curl, exif, fileinfo, soap, xmlreader, xmlwriter, xsl
          coverage: xdebug
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
        
      - name: Install Node.js dependencies
        run: npm ci
        
      - name: Run PHP CodeSniffer
        run: vendor/bin/phpcs --standard=PSR12 src/ config/ tests/
        
      - name: Run PHPStan
        run: vendor/bin/phpstan analyse src/ config/ tests/ --level=5
        
      - name: Run ESLint
        run: npm run lint
        
      - name: Run Stylelint
        run: npm run lint:css
        
      - name: Run Prettier check
        run: npm run format:check

  # PHP Tests
  php-tests:
    name: PHP Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:${{ env.MYSQL_VERSION }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cbt_sekolah_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
        ports:
          - 3306:3306
          
      redis:
        image: redis:${{ env.REDIS_VERSION }}
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3
        ports:
          - 6379:6379
          
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, redis, gd, zip, curl, exif, fileinfo, soap, xmlreader, xmlwriter, xsl
          coverage: xdebug
          
      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
        
      - name: Create test environment file
        run: |
          cp .env.example .env.test
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env.test
          sed -i 's/DB_PORT=.*/DB_PORT=3306/' .env.test
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=cbt_sekolah_test/' .env.test
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=test_user/' .env.test
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=test_password/' .env.test
          sed -i 's/REDIS_HOST=.*/REDIS_HOST=127.0.0.1/' .env.test
          sed -i 's/REDIS_PORT=.*/REDIS_PORT=6379/' .env.test
          
      - name: Wait for MySQL
        run: |
          while ! mysqladmin ping -h"127.0.0.1" -P"3306" -u"test_user" -p"test_password" --silent; do
            sleep 1
          done
          
      - name: Wait for Redis
        run: |
          while ! redis-cli -h 127.0.0.1 -p 6379 ping; do
            sleep 1
          done
            
      - name: Run database migrations
        run: php artisan migrate --env=testing
        
      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --coverage-clover=coverage/coverage.xml
        
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: coverage/coverage.xml
          flags: php
          name: php-coverage

  # JavaScript Tests
  js-tests:
    name: JavaScript Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Jest tests
        run: npm run test:ci
        
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: coverage/lcov.info
          flags: javascript
          name: js-coverage

  # Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          
      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
        
      - name: Run PHP Security Checker
        run: vendor/bin/security-checker security:check composer.lock
        
      - name: Run PHP CS Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff
        
      - name: Run PHP Mess Detector
        run: vendor/bin/phpmd src/ text cleancode,codesize,controversial,design,naming,unusedcode

  # Docker Build
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [code-quality, php-tests, js-tests, security-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cbt-sekolah:latest
            ${{ secrets.DOCKER_USERNAME }}/cbt-sekolah:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/cbt-sekolah:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to staging server
        run: |
          echo "Deploying to staging server..."
          # Add your deployment commands here
          
      - name: Notify staging deployment
        run: |
          echo "Staging deployment completed successfully!"

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to production server
        run: |
          echo "Deploying to production server..."
          # Add your deployment commands here
          
      - name: Notify production deployment
        run: |
          echo "Production deployment completed successfully!"

  # Performance Tests
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun
          
      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci/

  # Dependency Updates
  dependency-updates:
    name: Dependency Updates
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: |
          composer install --prefer-dist --no-progress --no-interaction
          npm ci
          
      - name: Check for PHP dependency updates
        run: composer outdated --direct
        
      - name: Check for Node.js dependency updates
        run: npm outdated
        
      - name: Create dependency update PR
        run: |
          echo "Creating dependency update PR..."
          # Add your dependency update logic here

  # Documentation
  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Generate API documentation
        run: npm run docs:generate
        
      - name: Deploy documentation
        run: |
          echo "Deploying documentation..."
          # Add your documentation deployment logic here

  # Notifications
  notifications:
    name: Notifications
    runs-on: ubuntu-latest
    needs: [code-quality, php-tests, js-tests, security-scan, docker-build]
    if: always()
    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#cbt-ci'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          
      - name: Notify Discord
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "CBT Sekolah CI/CD"
          description: "Build ${{ github.run_number }} completed with status: ${{ job.status }}"