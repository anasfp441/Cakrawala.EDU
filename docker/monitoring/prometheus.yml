# Prometheus Configuration for CBT Sekolah Application
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: "cbt-sekolah"
    application: "cbt-app"

# Alerting rules
rule_files:
  - "cbt-sekolah-rules.yml"

# Alert manager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 15s

  # CBT Web Application
  - job_name: 'cbt-web'
    static_configs:
      - targets: ['web:80']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # CBT API
  - job_name: 'cbt-api'
    static_configs:
      - targets: ['web:80']
    metrics_path: '/api/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # MySQL Database
  - job_name: 'mysql'
    static_configs:
      - targets: ['database:3306']
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # Redis Cache
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # Nginx Reverse Proxy
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    metrics_path: '/nginx_status'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # HAProxy Load Balancer
  - job_name: 'haproxy'
    static_configs:
      - targets: ['haproxy:8404']
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # Node Exporter (System metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # PHP-FPM
  - job_name: 'php-fpm'
    static_configs:
      - targets: ['web:9000']
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    metrics_path: '/status'
    params:
      format: ['json']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # Apache Web Server
  - job_name: 'apache'
    static_configs:
      - targets: ['web:80']
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    metrics_path: '/server-status'
    params:
      auto: ['1']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # CBT Application Health Checks
  - job_name: 'cbt-health'
    static_configs:
      - targets: ['web:80']
    scrape_interval: 15s
    scrape_timeout: 5s
    honor_labels: true
    metrics_path: '/health'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # CBT Exam System
  - job_name: 'cbt-exam'
    static_configs:
      - targets: ['web:80']
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    metrics_path: '/exam/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # CBT Admin Panel
  - job_name: 'cbt-admin'
    static_configs:
      - targets: ['web:80']
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    metrics_path: '/admin/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # File Upload System
  - job_name: 'cbt-upload'
    static_configs:
      - targets: ['web:80']
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    metrics_path: '/upload/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # Database Backup System
  - job_name: 'cbt-backup'
    static_configs:
      - targets: ['backup:80']
    scrape_interval: 60s
    scrape_timeout: 10s
    honor_labels: true
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # Mail Server
  - job_name: 'mail'
    static_configs:
      - targets: ['mail:25']
    scrape_interval: 60s
    scrape_timeout: 10s
    honor_labels: true
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # Cron Jobs
  - job_name: 'cron'
    static_configs:
      - targets: ['web:80']
    scrape_interval: 60s
    scrape_timeout: 10s
    honor_labels: true
    metrics_path: '/cron/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # Queue Workers
  - job_name: 'queue-workers'
    static_configs:
      - targets: ['web:80']
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    metrics_path: '/queue/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # WebSocket Server
  - job_name: 'websocket'
    static_configs:
      - targets: ['web:6001']
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

# Service discovery for dynamic targets
  - job_name: 'cbt-service-discovery'
    consul_sd_configs:
      - server: 'consul:8500'
        services: ['cbt-web', 'cbt-api', 'cbt-admin']
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    relabel_configs:
      - source_labels: [__meta_consul_service]
        target_label: service
      - source_labels: [__meta_consul_node]
        target_label: node
      - source_labels: [__meta_consul_tags]
        target_label: tags
        regex: '.*'
        replacement: '${1}'

# Blackbox monitoring for external endpoints
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - https://cbt-sekolah.local
        - https://api.cbt-sekolah.local
        - https://admin.cbt-sekolah.local
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

# Pushgateway for batch jobs
  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']
    scrape_interval: 30s
    scrape_timeout: 10s